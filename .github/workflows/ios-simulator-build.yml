name: iOS Simulator Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project ARFsSacolesGourmet.xcodeproj

      - name: Show simulator destinations
        run: |
          xcodebuild \
            -project ARFsSacolesGourmet.xcodeproj \
            -scheme ARFsSacolesGourmet \
            -showdestinations

      - name: Build for generic iOS Simulator
        run: |
          xcodebuild \
            -project ARFsSacolesGourmet.xcodeproj \
            -scheme ARFsSacolesGourmet \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

